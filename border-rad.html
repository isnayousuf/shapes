<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .container{
            width:  90vw;
            height: 100vh;
            background-color: rgb(7, 18, 37);
            display:grid;
            grid-template-columns: repeat(5, 1fr);
            grid-template-rows: auto;
            gap: 10px;
            margin-left: 3rem;
            padding-top: 3rem ;
        }
       .box1{
           width: 150px;
           height: 150px;
           background-color: coral;
           margin: 0 1rem;
           border-radius: 70% 70% 30% 30%;
       }
       .box2{
           width: 150px;
           height: 150px;
           background-color: coral;
           margin-right: 1rem;
           border-radius: 14rem 2rem; 
       }
       .box3{
           width: 180px;
           height: 90px;
           background-color: coral;
           margin-right: 1rem;
           border-radius: 90px 90px 0 0; /*top-left, top-right, bottom-right bottom-left*/
        }
        .box4{
           width: 150px;
           height: 150px;
           background-color: coral;
           margin: 0 1rem;
           border-radius: 8rem 3rem / 15% 40%; 
        }
        .box5{
            width: 150px;
           height: 150px;
           background-color: coral;
           margin: 0 1rem;
           border-radius: 150px 0 0 0 / 150px 0 0 0;
        }
        .box6{
            width: 150px;
           height: 150px;
           background-color: coral;
           margin: 0 1rem;
           border-radius: 0 0 150px 150px / 0 0 150px 150px;

        }
        .box7{
            width: 150px;
           height: 150px;
           background-color: coral;
           margin:  0 1rem;
           border-radius: 40% 0 40% 0;

        }
       
        .box9{
            width: 150px;
           height: 150px;
           background-color: coral;
           margin-left: 1rem;
           border-radius: 3% 50%;

        }
        .box10{
            width: 150px;
           height: 150px;
           background-color: coral;
           margin-right: 1rem;
           border-radius: 10% 60% 10% 80% / 20% 80% 20% 10%;

        }
        .box11{
            width: 150px;
           height: 150px;
           background-color: coral;
           margin:0 1rem;
           border-radius: 70% 0 70% 50%;

        }
        .box12{
            width: 200px;
           height: 150px;
           background-color: coral;
           margin-right: 1rem;
           border-radius: 50% 50% ;
        }
    
       .box13{
           width: 0px;
           height: 0px;
           border-bottom: 120px solid coral;
           border-right: 100px solid transparent;
           border-left: 100px solid transparent; 
       }
       .box14{
           width: 0px;
           height: 0px;
           background-color: black;
           border-top: 55px solid red;
           border-bottom:55px solid blue;
           border-right: 80px solid green;
           border-left: 80px solid coral;
       }
       .box8{
           width: 100px;
           height: 50px;
           background-color: coral;
           border-radius: 50px 50px 0 0;
          position: relative;   
       }
       .box8::after{
           content: '';
           width: 100px;
           height: 50px;
           background-color: coral;
           border-radius:  0 0 50px 50px;
           position: absolute;   
           left: 5rem;
           top: 3.1rem;

       }
       .box15{
            width: 100px;
           height: 90px;
           border-bottom: 100px solid coral;
           border-right: 50px solid transparent;
           border-left: 50px solid transparent;
           position: relative;
           bottom: 5rem;
           margin:0 1rem;
          

        }

    </style>
</head>
<body>
    <div class="container">
    <div class="box1"></div>  
    <div class="box2"></div> 
    <div class="box3"></div> 
    <div class="box4"></div> 
    <div class="box5"></div>
    <div class="box6"></div>
   <div class="box7"></div>
   <div class="box8"></div>
   <div class="box9"></div>
   <div class="box10"></div>
   <div class="box11"></div>
   <div class="box12"></div>
   <div class="box13"></div>
   <div class="box14"></div>
   <div class="box15"></div>
</div>
</body>
</html>
